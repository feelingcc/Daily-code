    <script>
        // Promise 是一个类用来包装异步操作
        // promise的三种状态 Pending Fulfilled Rejected
        function delay (duration , n) {
            return new Promise((resolve , reject) => {
                setTimeout(() => {
                    resolve(n);
                } , duration);
            });
        }

        async function log () {
            // 在Promise实例前添加await关键字，那么await的返回值就是当前Promise的resolve参数
            const n1 = await delay(1000 , 1);
            console.log(n1);
            const n2 = await delay(2000 , 2);
            console.log(n2);
        }
        log();
