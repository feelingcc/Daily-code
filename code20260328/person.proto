syntax = "proto3";  
package person;    

option cc_generic_services = true;

enum PhoneType {
    MOBILE = 0; 
    HOME = 1;
    WORK = 2;
}
  
message Student {
    string name = 1;     
    int32 id = 2;       
    
    message PhoneNumber {
        string number = 1;
        PhoneType type = 2;
    }
    
    repeated PhoneNumber phones = 3;  
    map<string , float> scores = 4;  
}

message PersonRequest {
    int32 id = 1;
}

message PersonResponse {
    Student stu = 1;
}

service PersonService {
    rpc getPerson(PersonRequest) returns (PersonResponse);
}